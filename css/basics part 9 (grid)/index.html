<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS GRID</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .container {
            margin: 20px;
            border: 2px solid black;
            width: 90%;
            height: 90vh;
            display: grid; 
            /* default behavior => everthing is arranged vertically unlike flexbox */
            grid-template-columns: [pehl_col]100px [dusra_col]120px;
            /* ek column ho jaye mere 100px ki and dusri ho jaye 120px ki */
            /* can also use fr (fractional unit) meaning if width is 80vw then 1fr 1fr 1fr means 1/3 of the available space in that 80vw */

            grid-template-rows: [pehla_row]100px [dusra_row]120px;
            /* ek row ho jaye 100px ki and dusri ho jaye 120px ki and rest auto calculate ho jayegi just to fit the content */

            /* cell ke andr hi hote hai */
            justify-items: center;
            align-items: center;   
            
            /* overall grid center me aajayegi ye tbhi kaam karega jb container bda hai and grid choti hai */
            justify-content: center;
            align-content: center;


            /* to understand the justify item content alogn with align item content open the browser and use inspect */
        }

        .item {
            border: 2px solid red;
            width: 30px;
            height: 30px;
        }

        /* now 4 and 1 ek dusre ke upr hai */
        .item-1{
            /* grid-row-start: 1;
            grid-row-end: 2;
            grid-column-start: 1;
            grid-column-end: 2; */

            grid-row-start: pehla_row;
            grid-row-end: dusra_row;
            grid-column-start: pehl_col;
            grid-column-end: dusra_col;
        }


    </style>
</head>

<body>

    <div class="container">
        <div class="item item-1">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
        <div class="item item-1">4</div>
        <div class="item">5</div>
        <div class="item">6</div>
        <div class="item">7</div>
    </div>
</body>

</html>
