<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>styling list with the help of css</title>
    <style>
        ul li{
            background-color: yellow;
            list-style-position: inside;
            list-style-type: devanagari;
            list-style: none;
            padding: 10px;
        }

        ul{
            display: flex;;
        }
    </style>
</head>
<body>
    <ul>
        <li>Home</li>
        <li>About</li>
        <li>Contact</li>
    </ul>
</body>
</html>
