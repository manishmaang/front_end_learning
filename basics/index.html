<!DOCTYPE html>
<html lang="en">
    <!-- this tells that the webpage content is in English language -->
<head>
    <!-- head section contains the meta data of that page -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="">
    <!-- description which google shows below link when we search something (good for seo) -->

    <title>learning frontend</title>
<!-- title tag sets the tag which appears in chrome tab (seo also uses this) -->
    
    <link rel="stylesheet" href="style.css">
    <!-- links the css file to our html code -->

    <!-- rel and href are attributes and used to defined extra behaviour and configuration -->
</head>
<body>
    <!-- whatever content is inside the body it is shown in that web page -->
    
    <h1>learning the frontend.</h1>
    <!-- <script src="./script.js"></script> -->
</body>
</html>
